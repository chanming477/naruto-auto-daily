[project]
name = "naruto-auto-daily"
version = "0.1.0"
description = "V2 本地自动化工具 — 火影手游日常自动化（Phase 1 基础设施）"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "naruto-auto-daily" },
]

dependencies = [
    "loguru>=0.7.3",
    "pydantic>=2.7",
    "PyYAML>=6.0",
    "numpy>=2.0",
    "Pillow>=10.0",
    "mss>=9.0",
    "psutil>=5.9",
    "pywin32>=306 ; sys_platform == 'win32'",
    "opencv-python-headless>=4.9",
]

[project.scripts]
naruto-auto-daily = "main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core"]
include = ["main.py"]

[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B", "UP"]