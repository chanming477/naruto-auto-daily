# ============================================================
# naruto-auto-daily · 窗口/设备配置
# 描述要操控的目标窗口（模拟器或游戏客户端）
# ============================================================

# 当前活跃的设备/窗口 profile 名称
active_profile: "default"

profiles:
  # 占位 profile。运行 --init-config 后可手动修改。
  default:
    # 窗口匹配模式: title_contains / title_equals / class_name / pid / any
    #   title_contains : 模糊匹配窗口标题（推荐）
    #   title_equals   : 精确匹配窗口标题
    #   class_name     : 匹配窗口类名（如 Qt5QWindowIcon）
    #   pid            : 按进程 ID 匹配
    #   any            : 不做匹配，总是取第一个可见顶层窗口
    match_mode: "title_contains"
    # 匹配关键字（list，任一命中即视为匹配）
    match_keywords:
      - "模拟器"
      - "MuMu"
      - "雷电"
      - "Nox"
      - "NARUTO"
      - "火影"
    # 进程白名单（可选），为空则不限制
    process_whitelist: []
    # 进程黑名单（可选），常见系统窗口直接排除
    process_blacklist:
      - "explorer.exe"
      - "dwm.exe"
      - "ShellExperienceHost.exe"
      - "SearchHost.exe"
      - "TextInputHost.exe"
    # 是否要求窗口可见
    require_visible: true
    # 是否要求窗口未被最小化
    require_not_minimized: true
    # 期望窗口宽度（像素），0 表示不限制，仅做诊断提示
    expected_width: 0
    # 期望窗口高度（像素），0 表示不限制
    expected_height: 0