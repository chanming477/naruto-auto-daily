# ============================================================
# naruto-auto-daily · 任务注册表
#
# V2 修正: 删除 schedule_order。
# 唯一排序来源是每个任务的 ``display_order`` 字段。
# Scheduler._instantiate_tasks 按 display_order 升序排列所有
# enabled=true 的任务;``enabled=false`` 的任务被跳过。
#
# 字段说明(按 task_id 为 key):
#   task_class         : Python 类路径,格式 "module.ClassName"
#   enabled            : bool, 是否默认启用
#   display_order      : int, 排序键(Scheduler 按此升序执行)
#   category           : 分类字符串(daily / weekly / pvp / shop / mail ...)
#   description        : 一句话说明
#   estimated_time_sec : 预估耗时(仅展示用)
#   retry_on_failure   : bool, 失败是否重试
#   max_retries        : int, 最大重试次数
#   config_options     : dict, 任务级参数
# ============================================================

# Phase 6 业务扩展(2026-06-24):
#   新增 mail / liveness / group_signin 三个真实业务任务。
#   daily_signin 保持 Phase 3 已接入状态。
#   执行顺序(display_order): mail(2) → liveness(3) → group_signin(4) → daily_signin(5)
#   ⚠ mail / group_signin 当前模板缺失,任务以"尽力回主页"模式运行(SUCCESS 但不实际领奖)。
#     liveness 复用现有 liveness/* 模板,理论上可立即实跑。
#
# Phase 7+ 业务补全(2026-06-24):
#   按 docs/operation_flows.md 规格补全 recruit 任务。
#   shop 任务已废弃(用户决定不维护商城流程),保留代码注释见 git log。
#   执行顺序追加: recruit(6)
#   ⚠ recruit 模板大量缺失(详见 tasks/recruit_task.py 的 MISSING_TEMPLATES),
#     任务以"尽力回主页"模式运行(SUCCESS 但不实际招募)。

tasks:
