# ============================================================
# naruto-auto-daily · 全局应用配置
# 第一次运行 python main.py --init-config 会自动生成本文件
# ============================================================

app:
  name: "naruto-auto-daily"
  version: "0.7.0"
  phase: 8
  # 是否以调试模式启动（影响日志详细程度）
  debug: false

# 日志系统
logger:
  # 控制台日志级别（TRACE / DEBUG / INFO / SUCCESS / WARNING / ERROR / CRITICAL）
  console_level: "INFO"
  # 文件日志级别
  file_level: "DEBUG"
  # 日志目录（相对项目根目录）
  log_dir: "logs"
  # 单个日志文件最大字节数（默认 50MB）
  rotation_mb: 50
  # 历史日志保留天数
  retention_days: 30
  # 是否启用压缩归档
  compression: true
  # 错误时是否自动截图（依赖 ScreenshotManager）
  auto_screenshot_on_error: true

# 截图
screenshot:
  # 截图目录（相对项目根目录）
  output_dir: "screenshots"
  # 截图后端: win32_print_window / mss_full_screen
  backend: "win32_print_window"
  # 是否将截图转灰度（节省内存与磁盘）
  to_grayscale: false
  # 截图为空的容错重试次数
  max_empty_retries: 3
  # 重试间隔（毫秒）
  retry_delay_ms: 200

# ============ Phase 2 新增 ============

# ADB 客户端
adb:
  # ADB 可执行路径,空字符串 = 从 PATH 自动找 adb
  # 2026-07-14 默认走 PATH(MuMu 12 / 夜游神等都自带 adb 进 PATH,无需硬编码路径)
  adb_path: ""
  # 默认设备序列号(如 "127.0.0.1:16384" 或 "emulator-5554"),空 = 不指定
  # 2026-07-14: MuMu 12 实际端口 16384(原 7555 是旧版,MuMu Player 12 改 16384)
  #   雷电/Nox/BlueStacks 通常为 "emulator-5554" 或其自定端口
  # 留空时,ADBClient.connect() 会执行 `adb devices` 自动选第一个 device
  default_serial: "127.0.0.1:16384"
  # 单条 adb 命令的超时(秒)
  command_timeout_sec: 10
  # 失败重试次数(>=1)
  retry_count: 2

# 优先级说明(P6 真实接入):
#   ADBClient 解析 adb_path 的优先级:
#     1) 构造参数 adb_path= 显式覆盖(最高)
#     2) config.app.adb.adb_path(本文件,常用于 MuMu 等非 PATH 路径)
#     3) shutil.which('adb')(从系统 PATH 找)
#     4) 都没找到 → 抛 ADBUnavailableError
#   设备连接优先级:
#     1) 构造参数 serial= 显式覆盖
#     2) config.app.adb.default_serial
#     3) adb connect <serial> 直接连
#     4) 默认 → 执行 `adb devices` 选第一个 device 行

# 模板匹配
template_matching:
  # 默认匹配阈值,范围 [0.0, 1.0]
  default_threshold: 0.85
  # 是否启用多尺度匹配(Phase 2 占位,未实现)
  multi_scale: false
  # 多尺度缩放范围(占位)
  multi_scale_range: [0.95, 1.0, 1.05]

# game_state 段: P2-2 (2026-07-18) 删 — GameStateConfig 无 consumer
# 模板根目录从 resources/templates 迁到 resources/narutomobile/image (cmd_check 已更新)

# ============ Phase 8 新增 (2026-07-02) ============

# MaaFramework 桥接 (替代自研识别/导航引擎)
# 路径留空 = 默认 {project_root}/resources/narutomobile/
# 也可填绝对路径指向外部 narutomobile 安装目录
# 优先级: CLI --maafw-resource > 本字段 > 默认项目内
maafw:
  # narutomobile resource 路径(留空 = 项目内 resources/narutomobile)
  # 复制源: D:\自动日常源码带\MaaAutoNaruto-win-x86_64-v1.3.35\resource\base
  narutomobile_resource_path: ""
  # maafw Toolkit 初始化目录(log + cache 落盘)
  data_dir: "logs/maafw_data"